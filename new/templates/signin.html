{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In / Sign Up - MyFitness{% endblock %}

{% block extra_head %}
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
:root {
  --primary-purple: #667eea;
  --primary-dark-purple: #764ba2;
  --primary-pink: #f093fb;
  --accent-coral: #f5576c;
}

.auth-section {
  min-height: 100vh;
  background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
  padding: 80px 0;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.auth-section::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 600px;
  height: 600px;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
  border-radius: 50%;
  animation: float 15s ease-in-out infinite;
}

.auth-section::after {
  content: '';
  position: absolute;
  bottom: -50%;
  left: -10%;
  width: 500px;
  height: 500px;
  background: linear-gradient(135deg, rgba(240, 147, 251, 0.1), rgba(245, 87, 108, 0.1));
  border-radius: 50%;
  animation: float 12s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-30px) rotate(5deg); }
}

.auth-card {
  background: white;
  border-radius: 30px;
  box-shadow: 0 20px 60px rgba(102, 126, 234, 0.15);
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: white;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.close-btn:hover {
  background: var(--primary-purple);
  color: white;
  transform: rotate(90deg);
}

.auth-header {
  background: linear-gradient(135deg, var(--primary-purple) 0%, var(--primary-dark-purple) 50%, var(--primary-pink) 100%);
  padding: 60px 40px;
  text-align: center;
  position: relative;
}

.auth-logo {
  width: 100px;
  height: 100px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.auth-logo i {
  font-size: 3rem;
  background: linear-gradient(135deg, var(--primary-purple), var(--primary-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.auth-header h2 {
  color: white;
  font-size: 2.5rem;
  font-weight: 800;
  margin: 0;
}

.auth-body {
  padding: 40px;
}

.nav-tabs {
  border: none;
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

.nav-tabs .nav-link {
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  color: #64748b;
  font-weight: 600;
  padding: 12px 30px;
  transition: all 0.3s ease;
  flex: 1;
  text-align: center;
}

.nav-tabs .nav-link:hover {
  border-color: var(--primary-purple);
  color: var(--primary-purple);
}

.nav-tabs .nav-link.active {
  background: linear-gradient(135deg, var(--primary-purple), var(--primary-dark-purple));
  border-color: transparent;
  color: white;
}

.form-control {
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  padding: 14px 18px;
  transition: all 0.3s ease;
  font-size: 1rem;
  margin-bottom: 15px;
  width: 100%;
}

.form-control:focus {
  border-color: var(--primary-purple);
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
  outline: none;
}

.gender-group {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

.gender-option {
  flex: 1;
  padding: 12px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}

.gender-option input[type="radio"] {
  margin-right: 8px;
}

.gender-option:has(input:checked) {
  border-color: var(--primary-purple);
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
  width: 20px;
  height: 20px;
  cursor: pointer;
}

.btn-submit {
  background: linear-gradient(135deg, var(--primary-purple), var(--primary-dark-purple));
  border: none;
  color: white;
  border-radius: 12px;
  padding: 15px 30px;
  font-weight: 600;
  font-size: 1.1rem;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
  width: 100%;
  cursor: pointer;
}

.btn-submit:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
}
</style>
{% endblock %}

{% block main %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <div class="auth-card" data-aos="zoom-in">
          <button class="close-btn" onclick="window.location.href='{% url 'index' %}'">
            <i class="fas fa-times"></i>
          </button>

          <div class="auth-header">
            <div class="auth-logo">
              <i class="fas fa-dumbbell"></i>
            </div>
            <h2>MyFitness</h2>
          </div>

          <div class="auth-body">
            <ul class="nav nav-tabs" role="tablist">
              <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#signup-tab" role="tab">
                  <i class="fas fa-user-plus me-2"></i>Sign Up
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#signin-tab" role="tab">
                  <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </a>
              </li>
            </ul>

            <div class="tab-content">
              <!-- Sign Up Tab -->
              <div class="tab-pane fade show active" id="signup-tab" role="tabpanel">
                <form action="{% url 'signup' %}" method="post">
                  {% csrf_token %}
                  <input type="text" name="name1" class="form-control" placeholder="Username *" required>
                  <input type="email" name="email1" class="form-control" placeholder="Email Address *" required>
                  <input type="password" name="password1" class="form-control" placeholder="Password *" required>
                  <input type="date" name="dob1" class="form-control" placeholder="Date of Birth">
                  
                  <div class="gender-group">
                    <label class="gender-option">
                      <input type="radio" name="gender1" value="male" required> Male
                    </label>
                    <label class="gender-option">
                      <input type="radio" name="gender1" value="female" required> Female
                    </label>
                  </div>

                  <input type="tel" name="phone1" class="form-control" placeholder="Phone Number" pattern="[0-9]{10}">
                  <input type="text" name="address1" class="form-control" placeholder="Address">

                  <label class="checkbox-label">
                    <input type="checkbox" id="agree-check" required>
                    <span>I agree to the terms & conditions</span>
                  </label>

                  <button type="submit" class="btn-submit">
                    <i class="fas fa-rocket me-2"></i>Create Account
                  </button>
                </form>
              </div>

              <!-- Sign In Tab -->
              <div class="tab-pane fade" id="signin-tab" role="tabpanel">
                <form action="{% url 'login' %}" method="post">
                  {% csrf_token %}
                  <input type="text" name="username" class="form-control" placeholder="Username *" required>
                  <input type="password" name="password" class="form-control" placeholder="Password *" required>
                  
                  <button type="submit" class="btn-submit">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({duration: 1000});
</script>
{% endblock %}
